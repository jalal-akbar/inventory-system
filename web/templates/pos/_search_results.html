{{ range .Products }}
<div class="product-card animate-fade-in {{ if le .total_stock 0 }}out-of-stock{{ end }}" 
     data-id="{{ .id }}" 
     data-name="{{ .name }}" 
     data-price="{{ .selling_price }}" 
     data-sku="{{ .sku_code }}" 
     data-unit="{{ .unit }}"
     data-stock="{{ .total_stock }}"
     data-items-per-unit="{{ .items_per_unit }}"
     {{ if gt .total_stock 0 }}onclick="addCardToCart(this)"{{ end }}>
    
    {{ if le .total_stock 0 }}
    <div class="out-of-stock-overlay">
        <div class="out-of-stock-label">{{ t "pos_out_of_stock" .Lang }}</div>
    </div>
    {{ end }}

    <div class="product-name">{{ .name }}</div>

    <div class="card-meta">
        <span class="legal-badge {{ if eq .legal_category "Rx" }}rx{{ else }}otc{{ end }}">{{ .legal_category }}</span>
    </div>

    <div class="price-row">
        <span class="price-tag">Rp {{ formatNumber .selling_price }}</span>
        <span class="stock-badge {{ if le .total_stock 0 }}critical-stock{{ else if lt .total_stock 5 }}low-stock{{ else }}in-stock{{ end }}">
            {{ formatPcsToUnit .total_stock .unit .items_per_unit }}
        </span>
    </div>
</div>
{{ else }}
<div style="grid-column: 1 / -1;" class="empty-results">
    <p>{{ t "no_products_found" .Lang }}</p>
</div>
{{ end }}
