{{ define "base" }}
<!DOCTYPE html>
<html lang="{{ .Lang }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .browserTitle }}</title>
    <!-- Google Fonts: Inter & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- HTMX (CDN) -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- SweetAlert2 (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Toastify (CDN) -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <!-- Chart.js (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/assets/css/style.css">
    <!-- Password Toggle CSS -->
    <link rel="stylesheet" href="/static/assets/css/password_toggle.css">
    <meta name="csrf-token" content="{{ .CSRFToken }}">
    <script>
        // Global Fetch Interceptor for CSRF
        const originalFetch = window.fetch;
        window.fetch = function(url, options = {}) {
            if (options.method && ['POST', 'PUT', 'DELETE', 'PATCH'].includes(options.method.toUpperCase())) {
                options.headers = options.headers || {};
                const token = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
                if (token) {
                    options.headers['X-CSRF-Token'] = token;
                }
            }
            return originalFetch(url, options);
        };

        // Global HTMX Interceptor for CSRF
        document.addEventListener('htmx:configRequest', function(evt) {
            const token = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
            if (token) {
                evt.detail.headers['X-CSRF-Token'] = token;
            }
        });
    </script>
    <style>
        .notification-dropdown { position: relative; }
        .notification-menu {
            position: absolute;
            top: 100%;
            right: 0;
            width: 280px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            margin-top: 10px;
            display: none;
            z-index: 1000;
            padding: 8px 0;
        }
        .notification-menu.show { display: block; }
        .notification-badge.active { color: #f97316; }
        .notification-header {
            padding: 12px 16px;
            font-weight: 700;
            color: #1e293b;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
        }
        .notification-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            text-decoration: none;
            color: #475569;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .notification-item:hover { background: #f8fafc; color: #f97316; }
        .notification-item i { width: 18px; height: 18px; }
        .notification-empty { padding: 20px; text-align: center; color: #94a3b8; font-size: 0.85rem; }
        .badge-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            font-size: 0.65rem;
            padding: 2px 5px;
            border-radius: 10px;
            border: 2px solid white;
        }
    </style>
</head>

<body>
    {{ template "sidebar" . }}

    <div class="main-wrapper">
        {{ template "topbar" . }}
        
        {{ template "content" . }}

        {{ template "footer" . }}
    </div>

    <!-- Lucide Icons init -->
    <script>
      lucide.createIcons();
    </script>
    <!-- Custom JS -->
    <script src="/static/assets/js/password_toggle.js"></script>
    <script src="/static/assets/js/main.js"></script>
</body>
</html>
{{ end }}
