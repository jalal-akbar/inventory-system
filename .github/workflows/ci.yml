name: Go CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: go mod download

      - name: Run Vet
        run: go vet ./...

      - name: Build
        run: go build -v -o rabella-app ./cmd/main.go

      - name: Test
        run: go test -v ./...
